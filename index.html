<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Currency Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <h2>💱 Currency Dashboard</h2>
</header>
<!-- sidebar -->
<div class="layout">

  <div class="sidebar">
    <h3>🌍 Currencies</h3>

    <input type="text" id="searchCurrency" placeholder="Search...">
    <button id="filterBtn">Show Popular</button>

    <ul id="currencyList"></ul>
  </div>

  <div class="main">

    <div class="top-bar">
      <button id="themeBtn" class="toggle-btn">🌙</button>
    </div>

    <h3>💱 Convert Currency</h3>

    <input type="number" id="amount" value="1">

 
    <div class="selection">
      <div id="fromBox" class="select-box active">
        FROM: <span id="baseText">USD</span>
      </div>
      <div id="toBox" class="select-box">
        TO: <span id="targetText">INR</span>
      </div>
    </div>

    <button id="convertBtn">Convert</button>

    <h2 id="result"></h2>

  </div>

</div>

<script src="script.js" defer></script>
</body>
</html>
